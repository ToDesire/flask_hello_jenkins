apiVersion: apps/v1
kind: Deployment
metadate:
  name: pythontest
  labels:
    app: pythontest
spec:
  selector:
    matchlabels:
      app: pythontest
  strategy:
    type: Recreate
  replicas: 1
  template:
    metadata:
      labels:
        app: pythontest
    spec:
      containers:
        - images: 192.168.49.1:4000/pythontest:latest
          name: pythontest
          ports:
           - containerPort: 5000
             name: microport